<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>embellished: CV Fake</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>安部 まりあ</h1>

    <table class="infobox">
        <thead>
            <tr>
                <th colspan="2" class="infobox-title">安部 まりあ</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th>氏名</th>
                <td>安部 まりあ</td>
            </tr>
            <tr>
                <th>生年月日</th>
                <td>1989年</td>
            </tr>
            <tr>
                <th>出生地</th>
                <td>ここに出生地を入力</td>
            </tr>
        </tbody>
    </table>

    <section class="abstract">
        <p>
            <strong>安部 まりあ</strong>（あべ まりあ、1989年 - ）は、日本のアーティスト。〇〇を中心に活動し、△△の分野で知られる。
        </p>
    </section>

    <div class="accordion-group">
        
        <details>
            <summary>人物</summary>
            <div class="content">
                <p>性格、信念、趣味、対人関係などの個人的な側面を記述します。</p>
            </div>
        </details>

        <details>
            <summary>来歴・エピソード</summary>
            <div class="content">
                <p>幼少期から現在に至るまでの歩みや、有名な逸話を記述します。</p>
            </div>
        </details>

        <details>
            <summary>受賞歴</summary>
            <div class="content">
                <ul>
                    <li>20XX年 - 〇〇大賞</li>
                </ul>
            </div>
        </details>

        <details>
            <summary>主な個展・グループ展</summary>
            <div class="content">
                <p><strong>個展</strong></p>
                <ul>
                    <li>「展覧会名」 会場名、20XX年</li>
                </ul>
            </div>
        </details>

        <details>
            <summary>作品・作風</summary>
            <div class="content">
                <p>作品のテーマや、使用する技法についての詳細です。</p>
            </div>
        </details>

    </div>
</div>

</body>
</html>
